<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerenciador de Usuários</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">
    <div class="container">
      <h1>Gerenciador de Usuários</h1>
      <p class="subtitle">Projeto Frontend integrado com API Node + Prisma</p>
    </div>
  </header>

  <main class="container">

    <!-- CARD FORM -->
    <section class="card">
      <h2>Cadastrar Novo Usuário</h2>

      <form id="user-form" class="form">
        
        <div class="form-group">
          <label for="name">Nome</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Digite o nome"
            required 
          />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Digite o email"
            required 
          />
        </div>

        <div class="form-group">
  <label for="idade">Idade</label>
  <input 
    type="number" 
    id="idade" 
    name="idade" 
    placeholder="Digite a idade"
    required 
  />
</div>

        <button type="submit" class="btn-primary">
          Cadastrar
        </button>

      </form>

      <div id="mensagem" class="mensagem"></div>
    </section>

    <!-- CARD LISTA -->
    <section class="card">
      <div class="card-header">
        <h2>Lista de Usuários</h2>
        <button onclick="carregarUsuarios()" class="btn-secondary">
          Atualizar
        </button>
      </div>

      <div class="table-wrapper">
        <table class="tabela">
          <thead>
            <tr>
              <th>Nome</th>
              <th>Email</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="lista-usuarios">
            <!-- Usuários serão inseridos via JS -->
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Desenvolvido por Carol Warzynski • Projeto para Portfólio</p>
  </footer>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
